<div class="iframe-container">
  @for (frame of frames; track trackFrame($index, frame)) {
    <iframe
      #streamlitFrame
      [src]="frame.safeSrc"
      [title]="'BOP analytics - ' + frame.page"
      [attr.data-streamlit-slug]="frame.slug"
      [class.is-active]="frame.slug === activeSlug"
      [attr.aria-hidden]="frame.slug === activeSlug ? null : 'true'"
      frameborder="0"
      class="streamlit-iframe"
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>
  }
</div>
